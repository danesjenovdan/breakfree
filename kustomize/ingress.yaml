apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: imasjajca
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - imasjajca.si
        - www.imasjajca.si
      secretName: imasjajca-tls
  rules:
    - host: imasjajca.si
      http: &http_paths
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: imasjajca
                port:
                  number: 80
    - host: www.imasjajca.si
      http: *http_paths
